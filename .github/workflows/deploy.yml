# ============================================================
# deploy.yml — main ブランチへのプッシュで ECS へ自動デプロイ
#
# フロー:
#   1. 変更検出    — apps/web / apps/api の差分を検出し、不要なビルドをスキップ
#   2. Build & Push — ECR へイメージをプッシュ
#   3. trivy スキャン — HIGH/CRITICAL 脆弱性を検知した場合デプロイを強制中断
#   4. DB Migration — ECS Run Task で prisma migrate deploy を実行
#   5. ECS Deploy   — タスク定義を更新しサービスをローリングアップデート
#   6. CF Update    — ECS タスクの Public IP を CloudFront オリジンに反映
#
# 必須 GitHub Secrets:
#   AWS_ROLE_ARN          — terraform output github_actions_role_arn の値
#   AWS_REGION            — ap-northeast-1
#   ECR_REGISTRY          — <account-id>.dkr.ecr.ap-northeast-1.amazonaws.com
#   ECS_CLUSTER           — terraform output ecs_cluster_name の値
#   ECS_SERVICE_WEB       — terraform output ecs_web_service_name の値
#   ECS_SERVICE_API       — terraform output ecs_api_service_name の値
#   ECS_TASK_FAMILY_WEB   — terraform output ecs_web_task_family の値
#   ECS_TASK_FAMILY_API   — terraform output ecs_api_task_family の値
#   ECS_SUBNETS           — terraform output public_subnet_ids の値（カンマ区切り）
#   SG_API_ID             — terraform output sg_api_id の値
#   CLOUDFRONT_DIST_ID    — terraform output cloudfront_distribution_id の値
# ============================================================

name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'パスフィルターをバイパスして強制デプロイする (web と api の両方をビルド)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  id-token: write  # OIDC トークン取得に必要
  contents: read

jobs:
  # ─── 変更ファイルの検出 ──────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/common/**'
              - 'packages/api-client/**'
            api:
              - 'apps/api/**'
              - 'packages/common/**'

  # ─── ECR へイメージをビルド & プッシュ ───────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true' || needs.detect-changes.outputs.api == 'true' || github.event.inputs.force_deploy == 'true'
    outputs:
      web-image: ${{ steps.web-image.outputs.image }}
      api-image: ${{ steps.api-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web image
        id: web-image
        if: needs.detect-changes.outputs.web == 'true' || github.event.inputs.force_deploy == 'true'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/budget-dev-web:${IMAGE_TAG}"
          docker buildx build \
            --file apps/web/Dockerfile \
            --tag "${IMAGE}" \
            --tag "${ECR_REGISTRY}/budget-dev-web:latest" \
            --cache-from type=registry,ref="${ECR_REGISTRY}/budget-dev-web:latest" \
            --cache-to type=inline \
            --push \
            .
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build & push api image
        id: api-image
        if: needs.detect-changes.outputs.api == 'true' || github.event.inputs.force_deploy == 'true'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/budget-dev-api:${IMAGE_TAG}"
          docker buildx build \
            --file apps/api/Dockerfile \
            --tag "${IMAGE}" \
            --tag "${ECR_REGISTRY}/budget-dev-api:latest" \
            --cache-from type=registry,ref="${ECR_REGISTRY}/budget-dev-api:latest" \
            --cache-to type=inline \
            --push \
            .
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

  # ─── trivy 脆弱性スキャン ──────────────────────────────────────────────────────
  # HIGH / CRITICAL が検出された場合はここで強制中断し、後続ジョブをすべてブロックする
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.web-image != '' || needs.build-and-push.outputs.api-image != ''
    permissions:
      security-events: write # SARIF 結果を GitHub Security タブへアップロードするために必要
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan web image
        if: needs.build-and-push.outputs.web-image != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.web-image }}
          format: sarif
          output: trivy-web.sarif
          # HIGH / CRITICAL を検知した場合はステップを失敗させデプロイを中断
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload web scan results to GitHub Security
        if: always() && needs.build-and-push.outputs.web-image != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - name: Scan api image
        if: needs.build-and-push.outputs.api-image != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.api-image }}
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload api scan results to GitHub Security
        if: always() && needs.build-and-push.outputs.api-image != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

  # ─── DB マイグレーション ─────────────────────────────────────────────────────
  db-migrate:
    name: DB Migration
    runs-on: ubuntu-latest
    needs: [build-and-push, trivy-scan]
    if: needs.build-and-push.outputs.api-image != '' && needs.trivy-scan.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run prisma migrate deploy via ECS Run Task
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_API }}
          SUBNETS: ${{ secrets.ECS_SUBNETS }}
          SG_API: ${{ secrets.SG_API_ID }}
        run: |
          # 最新タスク定義 ARN を取得
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # マイグレーション専用タスクを実行（コマンド上書き）
          TASK_ARN=$(aws ecs run-task \
            --cluster "${CLUSTER}" \
            --task-definition "${TASK_DEF}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG_API}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","build/apps/api/src/index.js","--migrate"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: ${TASK_ARN}"

          # タスク完了を待機
          aws ecs wait tasks-stopped \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}"

          # 終了コードを確認
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi

          echo "Migration completed successfully"

  # ─── ECS サービス更新 ────────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, trivy-scan, db-migrate]
    # db-migrate がスキップ（API 変更なし）の場合も実行する。trivy が失敗した場合は中断。
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      needs.trivy-scan.result == 'success' &&
      (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy web service sidecar
        # web または api のいずれかが変更された場合にサイドカータスク定義を更新
        if: needs.build-and-push.outputs.web-image != '' || needs.build-and-push.outputs.api-image != ''
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE_WEB }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_WEB }}
          NEW_WEB_IMAGE: ${{ needs.build-and-push.outputs.web-image }}
          NEW_API_IMAGE: ${{ needs.build-and-push.outputs.api-image }}
        run: |
          # 現在のサイドカータスク定義を取得
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          # 変更があったコンテナのみ image を差し替え（空文字の場合は現在の image を維持）
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg WEB_IMAGE "${NEW_WEB_IMAGE}" \
               --arg API_IMAGE "${NEW_API_IMAGE}" \
            '(if $WEB_IMAGE != "" then .containerDefinitions[0].image = $WEB_IMAGE else . end) |
             (if $API_IMAGE != "" then .containerDefinitions[1].image = $API_IMAGE else . end) |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment

          echo "web-task-def=${NEW_TASK_DEF_ARN}" >> "$GITHUB_ENV"

      - name: Update api task definition for DB migration
        # api タスク定義を最新イメージで更新（migrate コマンド実行のベースとして使用）
        if: needs.build-and-push.outputs.api-image != ''
        env:
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY_API }}
          NEW_IMAGE: ${{ needs.build-and-push.outputs.api-image }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg IMAGE "${NEW_IMAGE}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text

      - name: Wait for web service stability
        if: needs.build-and-push.outputs.web-image != '' || needs.build-and-push.outputs.api-image != ''
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE_WEB }}
        run: |
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"

  # ─── CloudFront オリジン更新 ─────────────────────────────────────────────────
  update-cloudfront:
    name: Update CloudFront Origin
    runs-on: ubuntu-latest
    needs: deploy-ecs
    if: needs.deploy-ecs.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update CloudFront origin and invalidate cache
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER }}
          SERVICE: ${{ secrets.ECS_SERVICE_WEB }}
          CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}
        run: bash scripts/update-cloudfront-origin.sh
