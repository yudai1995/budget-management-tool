openapi: 3.0.0
info:
  version: 1.0.0
  title: 家計簿管理ツール API
  description: 支出（Expense）の登録・管理を行う REST API。JWT Bearer 認証が必要。
servers:
  - url: http://localhost:3001
    description: ローカル開発
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TokenPairResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
        accessToken:
          type: string
          example: eyJhbGciOiJSUzI1NiJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJSUzI1NiJ9...
        userId:
          type: string
          example: user01
      required:
        - result
        - accessToken
        - refreshToken
        - userId
    ErrorResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - error
          example: error
        message:
          type: string
          example: エラーメッセージ
      required:
        - result
        - message
    LoginRequest:
      type: object
      properties:
        userId:
          type: string
          minLength: 1
          example: user01
        password:
          type: string
          minLength: 1
          example: ••••••••
      required:
        - userId
        - password
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
          example: eyJ...
      required:
        - refreshToken
    LogoutResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
            - error
          example: success
        message:
          type: string
          example: ログアウトしました
      required:
        - result
        - message
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          example: eyJ...
    ExpenseResponse:
      type: object
      properties:
        id:
          type: string
          description: Expense ID (ULID)
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        amount:
          type: integer
          description: 金額（円）
          example: 1000
        balanceType:
          anyOf:
            - type: number
              enum:
                - 0
            - type: number
              enum:
                - 1
          description: "収支区分: 0=支出, 1=収入"
          example: 0
        userId:
          type: string
          description: ユーザーID
          example: user01
        categoryId:
          type: integer
          description: カテゴリID
          example: 1
        content:
          type: string
          nullable: true
          description: 備考
          example: 昼食代
        date:
          type: string
          description: 日付 (YYYY-MM-DD)
          example: 2024-03-15
        createdDate:
          type: string
          description: 作成日時 (ISO 8601)
          example: 2024-03-15T12:00:00.000Z
        updatedDate:
          type: string
          description: 更新日時 (ISO 8601)
          example: 2024-03-15T12:00:00.000Z
        deletedDate:
          type: string
          nullable: true
          description: 削除日時 (ISO 8601)
          example: null
      required:
        - id
        - amount
        - balanceType
        - userId
        - categoryId
        - content
        - date
        - createdDate
        - updatedDate
        - deletedDate
    ExpenseListResponse:
      type: object
      properties:
        expense:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseResponse"
      required:
        - expense
    ExpenseDetailResponse:
      type: object
      properties:
        expense:
          $ref: "#/components/schemas/ExpenseResponse"
      required:
        - expense
    CreateExpenseBody:
      type: object
      properties:
        newData:
          type: object
          properties:
            amount:
              type: integer
              minimum: 1
              description: 金額（円）
              example: 1500
            balanceType:
              anyOf:
                - type: number
                  enum:
                    - 0
                - type: number
                  enum:
                    - 1
              description: "収支区分: 0=支出, 1=収入"
              example: 0
            userId:
              type: string
              minLength: 1
              description: ユーザーID
              example: user01
            date:
              type: string
              minLength: 1
              description: 日付 (YYYY-MM-DD)
              example: 2024-03-15
            content:
              type: string
              nullable: true
              description: 備考
              example: 昼食代
          required:
            - amount
            - balanceType
            - userId
            - date
          description: 支出データ
      required:
        - newData
    BudgetResponse:
      type: object
      properties:
        id:
          type: string
          description: Budget ID (ULID)
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        amount:
          type: integer
          description: 金額（円）
          example: 1000
        balanceType:
          anyOf:
            - type: number
              enum:
                - 0
            - type: number
              enum:
                - 1
          description: "収支区分: 0=支出, 1=収入"
          example: 0
        userId:
          type: string
          description: ユーザーID
          example: user01
        categoryId:
          type: integer
          description: カテゴリID
          example: 1
        content:
          type: string
          nullable: true
          description: 備考
          example: 食費予算
        date:
          type: string
          description: 日付 (YYYY-MM)
          example: 2024-03
        createdDate:
          type: string
          description: 作成日時 (ISO 8601)
        updatedDate:
          type: string
          description: 更新日時 (ISO 8601)
        deletedDate:
          type: string
          nullable: true
          description: 削除日時 (ISO 8601)
          example: null
      required:
        - id
        - amount
        - balanceType
        - userId
        - categoryId
        - content
        - date
        - createdDate
        - updatedDate
        - deletedDate
    BudgetListResponse:
      type: object
      properties:
        budget:
          type: array
          items:
            $ref: "#/components/schemas/BudgetResponse"
      required:
        - budget
    BudgetDetailResponse:
      type: object
      properties:
        budget:
          $ref: "#/components/schemas/BudgetResponse"
      required:
        - budget
    CreateBudgetBody:
      type: object
      properties:
        newData:
          type: object
          additionalProperties:
            nullable: true
          description: 予算データ
      required:
        - newData
    UserResponse:
      type: object
      properties:
        userId:
          type: string
          description: ユーザーID
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        userName:
          type: string
          description: ユーザー名
          example: 山田太郎
        email:
          type: string
          nullable: true
          description: メールアドレス
          example: taro@example.com
        role:
          type: string
          enum: &a1
            - ADMIN
            - USER
            - GUEST
          description: ユーザーロール
          example: USER
        status:
          type: string
          enum: &a2
            - ACTIVE
            - INACTIVE
          description: ユーザーステータス
          example: ACTIVE
        createdAt:
          type: string
          description: 作成日時 (ISO 8601)
          example: 2026-04-13T00:00:00.000Z
        updatedAt:
          type: string
          description: 更新日時 (ISO 8601)
          example: 2026-04-13T00:00:00.000Z
      required:
        - userId
        - userName
        - email
        - role
        - status
        - createdAt
        - updatedAt
    UserListResponse:
      type: object
      properties:
        user:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
      required:
        - user
    UserDetailResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - user
    CreateUserBody:
      type: object
      properties:
        userName:
          type: string
          minLength: 1
          maxLength: 50
          description: ユーザー名
          example: 山田太郎
        password:
          type: string
          minLength: 8
          description: パスワード（平文）
        email:
          type: string
          nullable: true
          format: email
          description: メールアドレス
          example: taro@example.com
        role:
          type: string
          enum: *a1
          description: ユーザーロール
          example: USER
      required:
        - userName
        - password
    UpdateUserBody:
      type: object
      properties:
        userName:
          type: string
          minLength: 1
          maxLength: 50
          description: ユーザー名
          example: 山田太郎
        password:
          type: string
          minLength: 8
          description: 新しいパスワード（平文）。省略時は変更なし
        email:
          type: string
          nullable: true
          format: email
          description: メールアドレス
          example: taro@example.com
        role:
          type: string
          enum: *a1
          description: ユーザーロール
          example: USER
        status:
          type: string
          enum: *a2
          description: ユーザーステータス
          example: ACTIVE
    SuccessResponse:
      type: object
      properties:
        result:
          type: string
          enum:
            - success
          example: success
      required:
        - result
  parameters: {}
paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: ログイン
      description: userId / password で認証し、JWT アクセストークンとリフレッシュトークンを返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 認証失敗（詳細は返さない）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/guest-login:
    post:
      tags:
        - Auth
      summary: ゲストログイン
      description: パスワード不要でゲストユーザーとしてログインし、JWT トークンペアを返す。
      responses:
        "200":
          description: ゲストログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "404":
          description: ゲストユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/refresh:
    post:
      tags:
        - Auth
      summary: トークンリフレッシュ
      description: リフレッシュトークンを消費し、新しいトークンペアを返す（Refresh Token Rotation）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: リフレッシュ成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPairResponse"
        "400":
          description: refreshToken が未指定
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: トークン無効または再利用検知
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/logout:
    post:
      tags:
        - Auth
      summary: ログアウト
      description: リフレッシュトークンを失効させる。
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/expense:
    get:
      tags:
        - Expense
      summary: 支出一覧取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 支出一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Expense
      summary: 支出登録
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "200":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDetailResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/expense/{id}:
    get:
      tags:
        - Expense
      summary: 支出詳細取得
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: リソース ID (ULID)
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: id
          in: path
      responses:
        "200":
          description: 支出詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDetailResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: リソースが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Expense
      summary: 支出更新
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: リソース ID (ULID)
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDetailResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Expense
      summary: 支出削除
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: リソース ID (ULID)
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: id
          in: path
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    enum:
                      - success
                required:
                  - result
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/budget:
    get:
      tags:
        - Budget
      summary: 予算一覧取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 予算一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetListResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Budget
      summary: 予算登録
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetBody"
      responses:
        "200":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetDetailResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/budget/{id}:
    get:
      tags:
        - Budget
      summary: 予算詳細取得
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: リソース ID (ULID)
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: id
          in: path
      responses:
        "200":
          description: 予算詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetDetailResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: リソースが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Budget
      summary: 予算更新
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: リソース ID (ULID)
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetDetailResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Budget
      summary: 予算削除
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: リソース ID (ULID)
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: id
          in: path
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    enum:
                      - success
                required:
                  - result
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/user:
    get:
      tags:
        - User
      summary: ユーザー一覧取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ユーザー一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - User
      summary: ユーザー登録
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/user/{userId}:
    get:
      tags:
        - User
      summary: ユーザー詳細取得
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: ユーザーID
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: userId
          in: path
      responses:
        "200":
          description: ユーザー詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: リソースが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - User
      summary: ユーザー更新
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: ユーザーID
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: userId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: リソースが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - User
      summary: ユーザー削除
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            description: ユーザーID
            example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          required: true
          name: userId
          in: path
